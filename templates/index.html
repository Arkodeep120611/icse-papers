{% extends "layout.html" %}

{% block content %}

<div class="text-center mb-5">

    <h1 class="fw-bold">
        ICSE Previous Year Question Papers
    </h1>

    <p class="text-muted">

        Browse previous years' ICSE board examination papers.

    </p>

</div>

<div class="row">

    {% for year in years %}

    <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div class="card shadow-sm year-card h-100">

            <div class="card-body text-center">

                <h3 class="fw-bold">

                    {{ year }}

                </h3>

                <a
                    href="/year/{{ year }}"
                    class="btn btn-primary mt-3">

                    View Papers

                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
